<div>

    <h1>
        Login
    </h1>


    <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
    />


    <br>


    <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
    />


    <br>


    <button (click)="login()">
        Login
    </button>


</div>
