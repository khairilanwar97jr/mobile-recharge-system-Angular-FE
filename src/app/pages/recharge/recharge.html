<h1>Recharge</h1>

<div>
  <label for="phoneNumber">Phone Number</label>
  <input
    id="phoneNumber"
    placeholder="Phone Number"
    [(ngModel)]="phoneNumber"
  />
</div>

<div>
  <label for="packageSelect">Recharge Package</label>

  <select id="packageSelect" [(ngModel)]="selectedPackageId">
    <option [ngValue]="null" disabled>Select a package</option>

    <option *ngFor="let pkg of packages" [ngValue]="pkg.id">
      {{ pkg.name }} - {{ pkg.amount }} {{ pkg.currency || 'USD' }}
    </option>
  </select>
</div>

<p *ngIf="isLoadingPackages">Loading packages...</p>

<button (click)="submitRecharge()">Recharge</button>
